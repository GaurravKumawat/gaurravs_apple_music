name: Build Unsigned iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build web production assets
      run: npx vite build
      env:
        NITRO_PRESET: static

    - name: Stage Nitro files for Capacitor
      run: |
        # Assemble a staging `./dist` for Capacitor with index.html + client assets
        mkdir -p dist
        # 1) If Nitro static public exists, use it as-is
        if [ -d ".output/public" ]; then
          cp -r .output/public/. ./dist/
        fi

        # 2) If Vite produced a `dist` with client assets, copy client and assets into staging
        if [ -d "dist/client" ]; then
          mkdir -p ./dist
          cp -r dist/client/. ./dist/ || true
        fi
        if [ -d "dist/assets" ]; then
          mkdir -p ./dist/assets
          cp -r dist/assets/. ./dist/assets/ || true
        fi

        # 3) If there is a root dist/index.html (common Vite SPA), copy it to staging
        if [ -f "dist/index.html" ]; then
          cp dist/index.html ./dist/index.html
        fi

        # 4) If client/index.html exists use that as fallback
        if [ -f "dist/client/index.html" ] && [ ! -f "./dist/index.html" ]; then
          cp dist/client/index.html ./dist/index.html
        fi

        # 5) If Nitro public/index.html exists and nothing else provided, copy it
        if [ -f ".output/public/index.html" ] && [ ! -f "./dist/index.html" ]; then
          cp .output/public/index.html ./dist/index.html
        fi

        # 6) If no index.html yet but a tracked dist/index.html exists in repo, restore it
        if [ ! -f "./dist/index.html" ]; then
          if git ls-files --error-unmatch dist/index.html > /dev/null 2>&1; then
            echo "Restoring committed dist/index.html from git"
            git restore --source=HEAD --worktree dist/index.html || git checkout -- dist/index.html || true
            cp dist/index.html ./dist/index.html || true
          fi
        fi

        # Final check
        if [ ! -f "./dist/index.html" ]; then
          echo "Error: no index.html found in staging ./dist; Capacitor requires an index.html entrypoint"
          ls -la dist || true
          ls -la .output || true
          exit 1
        fi

        ls -la ./dist

    - name: Copy web assets to Native project
      run: npx cap copy ios

    - name: Sync and Generate Xcode Workspace
      run: npx cap sync ios

    - name: Open and build Xcode Project Workspace
      run: |
        set -e
        cd ios/App
        # If workspace doesn't exist, try running pod install (creates workspace)
        if [ -f "App.xcworkspace" ]; then
          echo "Found App.xcworkspace — building workspace"
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
        else
          echo "App.xcworkspace not found — attempting pod install"
          if command -v pod >/dev/null 2>&1; then
            pod install --project-directory=.
          else
            echo "pod not available on runner; skipping pod install"
          fi
          if [ -f "App.xcworkspace" ]; then
            echo "Workspace created by pod install — building workspace"
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          elif [ -f "App.xcodeproj" ]; then
            echo "No workspace, falling back to building project file"
            xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          else
            echo "ERROR: no Xcode workspace or project found in ios/App"
            ls -la
            exit 1
          fi
        fi

    - name: Create Unsigned IPA Package
      run: |
        mkdir -p payload/Payload
        cp -r ios/App/build/Release-iphoneos/App.app payload/Payload/
        cd payload
        zip -r ../AppleMusic.ipa Payload
        
    - name: Upload Finished Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppleMusic-Unsigned-IPA
        path: AppleMusic.ipa
