name: Build Unsigned iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build web production assets
      run: npx vite build
      env:
        NITRO_PRESET: static

    - name: Stage Nitro files for Capacitor
      run: |
        # Assemble a staging `./dist` for Capacitor with index.html + client assets
        mkdir -p dist
        # 1) If Nitro static public exists, use it as-is
        if [ -d ".output/public" ]; then
          cp -r .output/public/. ./dist/
        fi

        # 2) If Vite produced a `dist` with client assets, copy client and assets into staging
        if [ -d "dist/client" ]; then
          mkdir -p ./dist
          cp -r dist/client/. ./dist/ || true
        fi
        if [ -d "dist/assets" ]; then
          mkdir -p ./dist/assets
          cp -r dist/assets/. ./dist/assets/ || true
        fi

        # 3) If there is a root dist/index.html (common Vite SPA), copy it to staging
        if [ -f "dist/index.html" ]; then
          cp dist/index.html ./dist/index.html
        fi

        # 4) If client/index.html exists use that as fallback
        if [ -f "dist/client/index.html" ] && [ ! -f "./dist/index.html" ]; then
          cp dist/client/index.html ./dist/index.html
        fi

        # 5) If Nitro public/index.html exists and nothing else provided, copy it
        if [ -f ".output/public/index.html" ] && [ ! -f "./dist/index.html" ]; then
          cp .output/public/index.html ./dist/index.html
        fi

        # 6) If no index.html yet but a tracked dist/index.html exists in repo, restore it
        if [ ! -f "./dist/index.html" ]; then
          if git ls-files --error-unmatch dist/index.html > /dev/null 2>&1; then
            echo "Restoring committed dist/index.html from git"
            git restore --source=HEAD --worktree dist/index.html || git checkout -- dist/index.html || true
            cp dist/index.html ./dist/index.html || true
          fi
        fi

        # Final check
        if [ ! -f "./dist/index.html" ]; then
          echo "Error: no index.html found in staging ./dist; Capacitor requires an index.html entrypoint"
          ls -la dist || true
          ls -la .output || true
          exit 1
        fi

        ls -la ./dist

    - name: Copy web assets to Native project
      run: npx cap copy ios

    - name: Sync and Generate Xcode Workspace
      run: npx cap sync ios

    - name: Open and build Xcode Project Workspace
      run: |
        set -e
        cd ios/App

        # Search for any nested .xcworkspace or .xcodeproj (depth 3)
        WORKSPACE_PATH=$(find . -maxdepth 3 -name "*.xcworkspace" -print -quit || true)
        if [ -n "$WORKSPACE_PATH" ]; then
          echo "Found workspace: $WORKSPACE_PATH"
          echo "Listing schemes in workspace"
          SCHEMES=$(xcodebuild -workspace "$WORKSPACE_PATH" -list 2>/dev/null | awk '/Schemes:/{flag=1;next}/^$/{if(flag)exit}flag{print}' | sed 's/^[[:space:]]*//') || true
          if [ -n "$SCHEMES" ]; then
            SCHEME=$(printf "%s\n" "$SCHEMES" | head -n1)
            echo "Using scheme: $SCHEME"
          else
            SCHEME=$(basename "$WORKSPACE_PATH" .xcworkspace)
            echo "No schemes listed; falling back to scheme: $SCHEME"
          fi
          xcodebuild -workspace "$WORKSPACE_PATH" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          exit 0
        fi

        echo "No .xcworkspace found under ios/App"
        # If there's a Podfile somewhere, run pod install in its directory
        PODFILE_DIR=$(find . -maxdepth 3 -name "Podfile" -exec dirname {} \; -print -quit || true)
        if [ -n "$PODFILE_DIR" ]; then
          echo "Found Podfile in: $PODFILE_DIR — running pod install"
          if command -v pod >/dev/null 2>&1; then
            pod install --project-directory="$PODFILE_DIR"
          else
            echo "pod command not found on runner — skipping pod install"
          fi
          # re-search for workspace
          WORKSPACE_PATH=$(find . -maxdepth 3 -name "*.xcworkspace" -print -quit || true)
          if [ -n "$WORKSPACE_PATH" ]; then
            echo "Workspace created: $WORKSPACE_PATH"
            echo "Listing schemes in workspace"
            SCHEMES=$(xcodebuild -workspace "$WORKSPACE_PATH" -list 2>/dev/null | awk '/Schemes:/{flag=1;next}/^$/{if(flag)exit}flag{print}' | sed 's/^[[:space:]]*//') || true
            if [ -n "$SCHEMES" ]; then
              SCHEME=$(printf "%s\n" "$SCHEMES" | head -n1)
              echo "Using scheme: $SCHEME"
            else
              SCHEME=$(basename "$WORKSPACE_PATH" .xcworkspace)
              echo "No schemes listed; falling back to scheme: $SCHEME"
            fi
            xcodebuild -workspace "$WORKSPACE_PATH" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
            exit 0
          fi
        else
          echo "No Podfile found — skipping pod install"
        fi

        # Try to find any .xcodeproj and build using its basename as scheme
        PROJ_PATH=$(find . -maxdepth 3 -name "*.xcodeproj" -print -quit || true)
        if [ -n "$PROJ_PATH" ]; then
          echo "Found Xcode project: $PROJ_PATH"
          echo "Listing schemes in project"
          SCHEMES=$(xcodebuild -project "$PROJ_PATH" -list 2>/dev/null | awk '/Schemes:/{flag=1;next}/^$/{if(flag)exit}flag{print}' | sed 's/^[[:space:]]*//') || true
          if [ -n "$SCHEMES" ]; then
            SCHEME=$(printf "%s\n" "$SCHEMES" | head -n1)
            echo "Using scheme: $SCHEME"
          else
            SCHEME=$(basename "$PROJ_PATH" .xcodeproj)
            echo "No schemes listed; falling back to scheme: $SCHEME"
          fi
          echo "Attempting to build project with scheme: $SCHEME"
          xcodebuild -project "$PROJ_PATH" -scheme "$SCHEME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          exit 0
        fi

        echo "ERROR: no Xcode workspace or project found in ios/App (searched depth 3)"
        ls -la
        exit 1

    - name: Create Unsigned IPA Package
      run: |
        mkdir -p payload/Payload
        cp -r ios/App/build/Release-iphoneos/App.app payload/Payload/
        cd payload
        zip -r ../AppleMusic.ipa Payload
        
    - name: Upload Finished Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppleMusic-Unsigned-IPA
        path: AppleMusic.ipa
