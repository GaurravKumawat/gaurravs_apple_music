name: Build Unsigned iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build web production assets
      run: npx vite build
      env:
        NITRO_PRESET: static

    - name: Stage Nitro files for Capacitor
      run: |
        # Prefer Nitro static output at .output/public, but fall back to common Vite outputs
        mkdir -p dist
        if [ -d ".output/public" ]; then
          cp -r .output/public/. ./dist/
        elif [ -d "dist/client" ]; then
          cp -r dist/client/. ./dist/
        elif [ -d "dist" ]; then
          cp -r dist/. ./dist/
        else
          echo "No built web assets found (checked .output/public, dist/client, dist)"
          ls -la
          exit 1
        fi
        # Ensure an index.html exists at dist root for Capacitor
        if [ -f ".output/public/index.html" ]; then
          cp .output/public/index.html ./dist/index.html
        elif [ -f "dist/client/index.html" ]; then
          cp dist/client/index.html ./dist/index.html
        elif [ -f "dist/index.html" ]; then
          cp dist/index.html ./dist/index.html
        else
          echo "Warning: no index.html found in expected build outputs"
        fi
        ls -la ./dist

    - name: Copy web assets to Native project
      run: npx cap copy ios

    - name: Sync and Generate Xcode Workspace
      run: npx cap sync ios

    - name: Open and build Xcode Project Workspace
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build

    - name: Create Unsigned IPA Package
      run: |
        mkdir -p payload/Payload
        cp -r ios/App/build/Release-iphoneos/App.app payload/Payload/
        cd payload
        zip -r ../AppleMusic.ipa Payload
        
    - name: Upload Finished Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AppleMusic-Unsigned-IPA
        path: AppleMusic.ipa
